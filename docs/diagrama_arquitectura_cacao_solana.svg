<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #111; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #444; }
      .box-title { font: 700 22px Arial, sans-serif; fill: #111; }
      .item { font: 400 18px Arial, sans-serif; fill: #222; }
      .label { font: 700 18px Arial, sans-serif; fill: #111; }
      .small { font: 400 16px Arial, sans-serif; fill: #333; }
      .box { fill: #fff; stroke: #111; stroke-width: 4; rx: 20; ry: 20; }
      .soft { fill: #f7f7f7; stroke: #111; stroke-width: 3; rx: 16; ry: 16; }
      .arrow { stroke: #111; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="9" refY="4.5" orient="auto">
      <polygon points="0 0, 10 4.5, 0 9" fill="#111"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1560" height="940" fill="#ffffff"/>
  <text x="60" y="70" class="title">Arquitectura del sistema · Trazabilidad alimentaria de cacao en Solana</text>
  <text x="60" y="105" class="subtitle">Representación de los componentes funcionales del MVP y de sus principales relaciones de interacción.</text>

  <rect x="70" y="170" width="360" height="320" class="box"/>
  <text x="95" y="210" class="box-title">Capa de presentación</text>
  <rect x="95" y="235" width="310" height="230" class="soft"/>
  <text x="115" y="275" class="item">• Interfaz web en Next.js / React</text>
  <text x="115" y="315" class="item">• Registro de actores</text>
  <text x="115" y="355" class="item">• Dashboards por rol</text>
  <text x="115" y="395" class="item">• Formularios de eventos y certificados</text>
  <text x="115" y="435" class="item">• Vista detallada del lote</text>

  <rect x="520" y="170" width="300" height="320" class="box"/>
  <text x="545" y="210" class="box-title">Capa de acceso</text>
  <rect x="545" y="235" width="250" height="230" class="soft"/>
  <text x="565" y="275" class="item">• Wallet Solana</text>
  <text x="565" y="315" class="item">• Wallet Adapter</text>
  <text x="565" y="355" class="item">• Firma de transacciones</text>
  <text x="565" y="395" class="item">• Conexión RPC</text>
  <text x="565" y="435" class="item">• Localnet / Devnet</text>

  <rect x="900" y="120" width="610" height="420" class="box"/>
  <text x="925" y="160" class="box-title">Capa lógica on-chain · Programa Anchor en Rust</text>
  <rect x="925" y="190" width="255" height="320" class="soft"/>
  <text x="945" y="228" class="item">• initialize</text>
  <text x="945" y="266" class="item">• register_actor</text>
  <text x="945" y="304" class="item">• validate_actor</text>
  <text x="945" y="342" class="item">• create_batch</text>
  <text x="945" y="380" class="item">• record_event</text>
  <text x="945" y="418" class="item">• update_batch_status</text>
  <text x="945" y="456" class="item">• issue_certificate</text>

  <rect x="1205" y="190" width="280" height="320" class="soft"/>
  <text x="1225" y="228" class="item">• revoke_certificate</text>
  <text x="1225" y="266" class="item">• control por roles</text>
  <text x="1225" y="304" class="item">• validación de transiciones</text>
  <text x="1225" y="342" class="item">• PDAs del sistema</text>
  <text x="1225" y="380" class="item">• timestamps on-chain</text>
  <text x="1225" y="418" class="item">• auditoría inmutable</text>
  <text x="1225" y="456" class="item">• restricciones de permisos</text>

  <rect x="140" y="610" width="1000" height="250" class="box"/>
  <text x="165" y="650" class="box-title">Modelo de datos on-chain</text>

  <rect x="165" y="680" width="150" height="145" class="soft"/>
  <text x="185" y="715" class="label">ProgramConfig</text>
  <text x="185" y="750" class="small">autoridad</text>
  <text x="185" y="780" class="small">contadores globales</text>

  <rect x="340" y="680" width="150" height="145" class="soft"/>
  <text x="360" y="715" class="label">PendingActor</text>
  <text x="360" y="750" class="small">solicitud pendiente</text>
  <text x="360" y="780" class="small">wallet y rol</text>

  <rect x="515" y="680" width="150" height="145" class="soft"/>
  <text x="555" y="715" class="label">Actor</text>
  <text x="535" y="750" class="small">nombre, rol, ubicación</text>
  <text x="535" y="780" class="small">estado activo</text>

  <rect x="690" y="680" width="150" height="145" class="soft"/>
  <text x="730" y="715" class="label">Batch</text>
  <text x="705" y="750" class="small">producto, origen, qty</text>
  <text x="705" y="780" class="small">estado y contadores</text>

  <rect x="865" y="680" width="160" height="145" class="soft"/>
  <text x="895" y="715" class="label">BatchEvent</text>
  <text x="890" y="750" class="small">tipo, actor, ubicación</text>
  <text x="890" y="780" class="small">timestamp, metadata</text>

  <rect x="1180" y="610" width="330" height="250" class="box"/>
  <text x="1205" y="650" class="box-title">Consulta y verificación</text>
  <rect x="1205" y="680" width="280" height="145" class="soft"/>
  <text x="1225" y="715" class="item">• Timeline del lote</text>
  <text x="1225" y="750" class="item">• Estado oficial actual</text>
  <text x="1225" y="785" class="item">• Último evento registrado</text>
  <text x="1225" y="820" class="item">• Explorer y certificados</text>

  <line x1="430" y1="330" x2="520" y2="330" class="arrow"/>
  <line x1="820" y1="330" x2="900" y2="330" class="arrow"/>
  <line x1="1040" y1="540" x2="900" y2="680" class="arrow"/>
  <line x1="1220" y1="540" x2="1280" y2="610" class="arrow"/>
  <line x1="600" y1="490" x2="600" y2="610" class="arrow"/>
</svg>